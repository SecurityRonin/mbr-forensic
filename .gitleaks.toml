# gitleaks configuration — extends the default ruleset and allowlists known
# false positives. CI cache keys (`corpus-mbr-v1`) trip gitleaks'
# generic-api-key rule on entropy alone; cache keys are not secrets. Scoped to
# the cache-key pattern so real secrets still surface.
[extend]
useDefault = true

[allowlist]
description = "CI cache keys are not secrets"
regexes = [
  '''corpus-mbr-v[0-9]+''',
]
